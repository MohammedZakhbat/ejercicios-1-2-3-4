<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./output.css">
    <title>Ejercicios JS</title>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen p-6">

    <h1 class="text-3xl font-bold text-center mb-8">Ejercicios JavaScript</h1>

    <div class="grid md:grid-cols-2 gap-6 max-w-5xl mx-auto">

        <!-- Ejercicio 4.1 -->
        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="text-xl font-semibold mb-4">4.1 Número mayor</h2>
            <input id="num1" type="number" placeholder="Número 1" class="border p-2 w-full mb-2 rounded">
            <input id="num2" type="number" placeholder="Número 2" class="border p-2 w-full mb-2 rounded">
            <button onclick="mayor()" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Comparar</button>
            <p id="res1" class="mt-3 font-medium"></p>
        </div>

        <!-- Ejercicio 4.2 -->
        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="text-xl font-semibold mb-4">4.2 Nivel de experiencia</h2>
            <input id="nombre" type="text" placeholder="Nombre" class="border p-2 w-full mb-2 rounded">
            <input id="años" type="number" placeholder="Años de experiencia" class="border p-2 w-full mb-2 rounded">
            <button onclick="nivel()" class="bg-green-500 text-white px-4 py-2 rounded w-full">Ver nivel</button>
            <p id="res2" class="mt-3 font-medium"></p>
        </div>

        <!-- Ejercicio 4.3 -->
        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="text-xl font-semibold mb-4">4.3 Palabra bonita</h2>
            <input id="palabra" type="text" placeholder="Introduce una palabra" class="border p-2 w-full mb-2 rounded">
            <button onclick="bonita()" class="bg-purple-500 text-white px-4 py-2 rounded w-full">Analizar</button>
            <p id="res3" class="mt-3 font-medium"></p>
        </div>

        <!-- Ejercicio 4.4 -->
        <div class="bg-white p-6 rounded-2xl shadow">
            <h2 class="text-xl font-semibold mb-4">4.4 Número a letras</h2>
            <input id="numero" type="number" placeholder="Número (0-10)" class="border p-2 w-full mb-2 rounded">
            <button onclick="convertir()" class="bg-red-500 text-white px-4 py-2 rounded w-full">Convertir</button>
            <p id="res4" class="mt-3 font-medium"></p>
        </div>

    </div>

    <script src="app.js">

    </script>

</body>

</html>
